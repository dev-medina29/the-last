<!DOCTYPE html>
<html>

<body>

    <h1>My First Google Map</h1>

    <div id="googleMap" style="width:100%;height:400px;"></div>

    <script>
        coordinate = {
            lat: - 4.271667229260911,
            lng: 15.260030653062937
        }
        function myMap() {
            var map = new google.maps.Map(document.getElementById("googleMap"), {
                zoom: 15,
                center: coordinate
            });
            new google.maps.Marker({
                position: coordinate,
                map: map,
                title: "Zoolandia Park"
            });
        }
    </script>

    <script
        src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBB_RWnqBgnEDvBLdrQcDjlCli0Kc6IlQw&callback=myMap"></script>

</body>

</html>
