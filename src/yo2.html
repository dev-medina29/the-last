<html>

<head>
    <title>Complex Marker Icons</title>
    <style>
        /**
       * @license
       * Copyright 2024 Google LLC. All Rights Reserved.
       * SPDX-License-Identifier: Apache-2.0
       */

        /* Optional: Makes the sample page fill the window. */
        html,
        body {
            height: 100%;
            margin: 0;
        }

        /* Shift the flag icon to the right so that the bottom of the flagpole
       * aligns with the anchor point. */
        .flag-icon {
            position: relative;
            left: 10px;
        }
    </style>
</head>

<body>
    <gmp-map center="-4.270929, 15.261125" zoom="15" map-id="DEMO_MAP_ID">
        <gmp-advanced-marker position="-4.270929, 15.261125" title="Zoolondia Park">
            <img class="flag-icon" src="https://svgcollections.com/wp-content/uploads/2024/06/elephant_icon_BFsew.png"
                width="20" height="20" />
        </gmp-advanced-marker>
        <script
            src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBB_RWnqBgnEDvBLdrQcDjlCli0Kc6IlQw&loading=async&libraries=marker&v=beta&solution_channel=GMP_CCS_complexmarkers_v3"
            defer></script>
    </gmp-map>
</body>

</html>
